<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 600" width="1800" height="600" data-fit-id="mma-boxing-fight-card" data-asset-type="pool-card-accent" data-palette="matte-black, canvas-white, corner-red, corner-blue, championship-gold" data-theme-primary="#ef4444">
  <defs>
    <style>
      :root {
        --fit-palette-0: #ef4444; /* matte-black */
        --fit-palette-1: #3b82f6; /* canvas-white */
        --fit-palette-2: #b91c1c; /* corner-red */
        --fit-palette-3: #ef4444; /* corner-blue */
        --fit-palette-4: #3b82f6; /* championship-gold */
      }
    </style>
    <linearGradient id="accentGrad-mma-boxing-fight-card" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="var(--fit-palette-0, #ef4444)" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="var(--fit-palette-2, #b91c1c)" stop-opacity="0.90"/>
