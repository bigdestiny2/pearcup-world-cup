<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 600" width="1800" height="600" data-fit-id="euros-copa-america" data-asset-type="pool-card-accent" data-palette="grass-green, sunlit-blue, cup-silver, alert-red" data-theme-primary="#3b82f6">
  <defs>
    <style>
      :root {
        --fit-palette-0: #3b82f6; /* grass-green */
        --fit-palette-1: #ef4444; /* sunlit-blue */
        --fit-palette-2: #1d4ed8; /* cup-silver */
        --fit-palette-3: #3b82f6; /* alert-red */
      }
    </style>
    <linearGradient id="accentGrad-euros-copa-america" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="var(--fit-palette-0, #3b82f6)" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="var(--fit-palette-2, #1d4ed8)" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="var(--fit-palette-1, #ef4444)" stop-opacity="0.85"/>
    </linearGradient>
    <clipPath id="accentClip-euros-copa-america">
      <rect width="1800" height="600" rx="48"/>
    </clipPath>
  </defs>
  <g clip-path="url(#accentClip-euros-copa-america)">
    <rect width="1800" height="600" fill="url(#accentGrad-euros-copa-america)"/>
    <circle cx="1600" cy="100" r="240" fill="#ffffff" opacity="0.08"/>
    <circle cx="160" cy="520" r="180" fill="#ffffff" opacity="0.06"/>
    <rect x="1400" y="120" width="120" height="120" rx="24" fill="#ffffff" opacity="0.14"/>
    <rect x="1580" y="360" width="80" height="80" rx="16" fill="#ffffff" opacity="0.12"/>
  </g>
</svg>