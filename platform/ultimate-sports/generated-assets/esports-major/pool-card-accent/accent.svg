<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 600" width="1800" height="600" data-fit-id="esports-major" data-asset-type="pool-card-accent" data-palette="obsidian, neon-teal, hot-pink, hud-green" data-theme-primary="#ec4899">
  <defs>
    <style>
      :root {
        --fit-palette-0: #ec4899; /* obsidian */
        --fit-palette-1: #6366f1; /* neon-teal */
        --fit-palette-2: #be185d; /* hot-pink */
        --fit-palette-3: #ec4899; /* hud-green */
      }
    </style>
    <linearGradient id="accentGrad-esports-major" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="var(--fit-palette-0, #ec4899)" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="var(--fit-palette-2, #be185d)" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="var(--fit-palette-1, #6366f1)" stop-opacity="0.85"/>
