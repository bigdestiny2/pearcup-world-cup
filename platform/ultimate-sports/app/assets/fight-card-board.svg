<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Non-branded fight card board</title>
  <desc id="desc">An abstract MMA fight card board with red and blue corners, a cage outline, and blank bout rows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
