      <stop offset=".48" stop-color="#24201c"/>
      <stop offset="1" stop-color="#0f2f2b"/>
    </linearGradient>
    <linearGradient id="cornerA" x1="0" x2="1">
      <stop stop-color="#d3343b"/>
      <stop offset="1" stop-color="#61171c"/>
    </linearGradient>
    <linearGradient id="cornerB" x1="0" x2="1">
