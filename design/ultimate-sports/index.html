<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' http://127.0.0.1:* http://localhost:* pear:; object-src 'none'; base-uri 'none'">
    <title>Ultimate Sports</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div id="app">
      <section class="view is-active" id="splash" aria-labelledby="splashTitle">
        <div class="splash-backdrop" aria-hidden="true"></div>
        <div class="splash-content">
          <span class="splash-mark">US</span>
          <h1 id="splashTitle">Ultimate Sports</h1>
          <p class="splash-tagline">One lobby. Every sport. Play with friends.</p>
          <div class="splash-stats" id="splashStats">
            <div><strong>0</strong><span>live servers</span></div>
            <div><strong>0</strong><span>players online</span></div>
          </div>
          <button type="button" class="splash-button" id="enterLobby">Enter lobby</button>
          <p class="splash-hint">Press any key or click to continue</p>
        </div>
      </section>

      <section class="view" id="lobby" aria-labelledby="lobbyTitle">
        <header class="lobby-header">
          <div class="lobby-brand">
            <span class="brand-mark">US</span>
            <div>
              <h1 id="lobbyTitle">Ultimate Sports</h1>
              <p>Server lobby</p>
            </div>
          </div>
          <div class="lobby-status" id="lobbyStatus" aria-live="polite"></div>
        </header>
        <main class="lobby-main">
          <div class="lobby-hero">
            <div>
              <p class="eyebrow">Live now</p>
              <h2>Pick a server to join</h2>
              <p class="detail-copy">Each sport runs its own themed server with live games, pools, and P2P mini-games.</p>
            </div>
            <div class="lobby-counts" id="lobbyCounts"></div>
          </div>
          <div class="sport-grid" id="sportGrid"></div>
        </main>
      </section>

      <section class="view" id="sport" aria-labelledby="sportTitle">
        <header class="sport-header" id="sportHeader"></header>
        <div class="sport-frame" id="sportFrame"></div>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./sports/sport-data.js"></script>
    <script src="./sports/mma-shell.js"></script>
    <script src="./sports/kawaii-loader.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
